<!doctype html>
<html class="no-js" lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>El Concursillo - Juego</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="theme-color" content="#fafafa">
</head>

<body>

<div class="main-screen">
  <div class="progress-bar" id="barra-progreso">
    <span class="step active">1</span>
    <span class="step">2</span>
    <span class="step">3</span>
    <span class="step">4</span>
    <span class="step">5</span>
  </div>

  <div class="question-box">
    <div id="contenedor-imagen" style="display: none; margin-bottom: 20px;">
      <img id="pregunta-img" src="" style="max-width: 100%; border-radius: 15px; border: 2px solid #ffcc00;">
    </div>

    <div id="contenedor-audio" style="display: none; margin-bottom: 20px;">
      <audio id="pregunta-audio" controls style="width: 100%;"></audio>
    </div>

    <h2 id="pregunta-texto">¿Cuál es la pregunta?</h2>
  </div>

  <div class="options-grid" id="opciones-container">
  </div>

  <div class="comodines-section">
    <button id="btn-5050" class="comodin-btn" onclick="usar5050()">🆘 50:50</button>
    <button id="btn-cambio" class="comodin-btn" onclick="cambiarPregunta()">🔄 Cambiar Pregunta</button>
    <button id="btn-llamada" class="comodin-btn" onclick="usarLlamada()">📞 Llamada</button>
  </div>

  <div id="contador-llamada" class="timer-hidden">
    Tiempo restante: <span id="segundos">60</span>s
  </div>
  <div id="puntuacion-final" style="margin-top: 20px; color: #ffcc00; font-weight: bold;">
    Puntos: <span id="puntos">0</span>
  </div>
</div>

<script src="js/app.js"></script>

</body>
</html>
